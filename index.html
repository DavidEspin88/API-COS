<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CRUD de Munición</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Panel de Control - Inventario de Munición</h1>
    
    <div class="dashboard-grid">
        <div class="card">
            <h2 id="form-title">Ingresar Munición</h2>
            <form id="crud-form">
                <input type="hidden" id="item-id">
                
                <div class="form-group">
                    <label for="calibre">Calibre</label>
                    <input type="text" id="calibre" required placeholder="Ej. 5.56mm / 9mm / 7.62mm">
                </div>
                
                <div class="form-group">
                    <label for="cantidad">Cantidad</label>
                    <input type="number" id="cantidad" required min="1" placeholder="0">
                </div>
                
                <div class="form-group">
                    <label for="lote">Número de Lote</label>
                    <input type="text" id="lote" required placeholder="Ej. LOT-2026-A">
                </div>
                
                <button type="submit" class="btn-submit" id="btn-save">Guardar</button>
                <button type="button" class="btn-cancel" id="btn-cancel" style="display:none;">Cancelar Edición</button>
            </form>
        </div>

        <div class="card">
            <h2>Inventario Actual (Pestaña MUNICION)</h2>
            <div id="loading-text" class="loading">Cargando datos desde Google Sheets...</div>
            <div class="table-container">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>Calibre</th>
                            <th>Cantidad</th>
                            <th>Lote</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
